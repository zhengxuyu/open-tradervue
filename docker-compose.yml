version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./tradervue.db
      - SECRET_KEY=local-dev-secret-change-in-production
      - CORS_ORIGINS=http://localhost:8000
      - FRONTEND_URL=http://localhost:8000
    volumes:
      - trade_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  trade_data:
