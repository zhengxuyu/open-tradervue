<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#080a09"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#10b981">
    <line x1="0" y1="150" x2="1200" y2="150" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke-width="1"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke-width="1"/>
  </g>

  <!-- Rising equity curve -->
  <path d="M0 500 Q100 480,200 460 T400 400 T600 320 T800 240 T1000 180 T1200 120" fill="none" stroke="#10b981" stroke-width="3" opacity="0.3"/>
  <path d="M0 500 Q100 480,200 460 T400 400 T600 320 T800 240 T1000 180 T1200 120 V630 H0Z" fill="url(#curveGrad)"/>

  <defs>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Logo -->
  <rect x="80" y="160" width="48" height="48" rx="12" fill="#10b981"/>
  <text x="104" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="#080a09">TJ</text>

  <!-- Title -->
  <text x="80" y="270" font-family="Inter, sans-serif" font-weight="800" font-size="56" fill="#e5e5e5">TradeJournal.dev</text>

  <!-- Subtitle -->
  <text x="80" y="330" font-family="Inter, sans-serif" font-weight="400" font-size="26" fill="#a3a3a3">Open source trading journal &amp; analytics</text>

  <!-- Feature pills -->
  <rect x="80" y="380" width="160" height="36" rx="18" fill="#10b981" opacity="0.15"/>
  <text x="160" y="404" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#10b981">Sharpe Ratio</text>

  <rect x="260" y="380" width="180" height="36" rx="18" fill="#10b981" opacity="0.15"/>
  <text x="350" y="404" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#10b981">P&amp;L Heatmap</text>

  <rect x="460" y="380" width="200" height="36" rx="18" fill="#10b981" opacity="0.15"/>
  <text x="560" y="404" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#10b981">Market Conditions</text>

  <rect x="680" y="380" width="150" height="36" rx="18" fill="#10b981" opacity="0.15"/>
  <text x="755" y="404" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#10b981">Self-Hostable</text>

  <!-- KPI preview -->
  <text x="80" y="490" font-family="monospace" font-weight="700" font-size="18" fill="#525252">P&amp;L</text>
  <text x="80" y="520" font-family="monospace" font-weight="800" font-size="32" fill="#34d399">+$42,190</text>

  <text x="320" y="490" font-family="monospace" font-weight="700" font-size="18" fill="#525252">WIN RATE</text>
  <text x="320" y="520" font-family="monospace" font-weight="800" font-size="32" fill="#e5e5e5">68.2%</text>

  <text x="560" y="490" font-family="monospace" font-weight="700" font-size="18" fill="#525252">PROFIT FACTOR</text>
  <text x="560" y="520" font-family="monospace" font-weight="800" font-size="32" fill="#10b981">2.41</text>

  <!-- URL -->
  <text x="1120" y="580" text-anchor="end" font-family="monospace" font-weight="600" font-size="16" fill="#525252">tradejournal.dev</text>
</svg>
